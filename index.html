<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />

  <title>Mario Platformer V1</title>

  <link rel="stylesheet" href="style.css" />

  <!-- MOBILE BUTTON STYLE -->
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #70c5ff;
    }

    canvas {
      display: block;
    }

    .controls {
      position: fixed;
      bottom: 20px;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 15px;
      z-index: 10;
    }

    .btn {
      width: 70px;
      height: 70px;
      border-radius: 12px;
      border: none;
      font-size: 22px;
      background: rgba(0,0,0,0.5);
      color: white;
      touch-action: none;
    }

    .btn:active {
      background: rgba(0,0,0,0.8);
    }
  </style>
</head>

<body>

  <!-- GAME CANVAS -->
  <canvas id="gameCanvas"></canvas>

  <!-- MOBILE CONTROLS -->
  <div class="controls">
    <button class="btn" ontouchstart="moveLeft()" ontouchend="stopMove()">⬅</button>
    <button class="btn" ontouchstart="jump()">⬆</button>
    <button class="btn" ontouchstart="moveRight()" ontouchend="stopMove()">➡</button>
  </div>

  <!-- GAME SCRIPT -->
  <script src="main.js"></script>

</body>
</html>
